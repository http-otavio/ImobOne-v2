<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ImobOne — Painel do Gestor</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d2e;
      --surface2: #232640;
      --border: #2e3155;
      --accent: #7c6af7;
      --accent2: #5ee7b7;
      --text: #e8eaf6;
      --muted: #8b8fa8;
      --hot: #ff6b6b;
      --warm: #ffd166;
      --cold: #4ecdc4;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 18px; }
    .logo-dot { width: 10px; height: 10px; background: var(--accent); border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.3)} }
    .header-meta { font-size: 13px; color: var(--muted); }
    .badge-live { background: #1e3a2e; color: var(--accent2); border-radius: 20px; padding: 3px 10px; font-size: 12px; font-weight: 600; }

    /* ── Layout ── */
    main { max-width: 1280px; margin: 0 auto; padding: 28px 24px; }
    .section-title { font-size: 12px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }

    /* ── KPI Cards ── */
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
    .kpi {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      position: relative;
      overflow: hidden;
    }
    .kpi::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--accent);
    }
    .kpi.hot::before { background: var(--hot); }
    .kpi.warm::before { background: var(--warm); }
    .kpi.cold::before { background: var(--cold); }
    .kpi-value { font-size: 36px; font-weight: 800; line-height: 1; margin-bottom: 6px; }
    .kpi-label { font-size: 13px; color: var(--muted); }

    /* ── Funil ── */
    .row2 { display: grid; grid-template-columns: 1fr 340px; gap: 20px; margin-bottom: 28px; }
    @media (max-width: 900px) { .row2 { grid-template-columns: 1fr; } }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
    }
    .card-title { font-size: 14px; font-weight: 600; margin-bottom: 18px; }

    /* ── Funil visual ── */
    .funnel { display: flex; flex-direction: column; gap: 8px; }
    .funnel-step {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .funnel-bar-wrap { flex: 1; background: var(--surface2); border-radius: 6px; overflow: hidden; height: 36px; }
    .funnel-bar {
      height: 100%;
      display: flex;
      align-items: center;
      padding-left: 12px;
      font-size: 13px;
      font-weight: 600;
      border-radius: 6px;
      transition: width .6s ease;
      min-width: 40px;
    }
    .funnel-label { font-size: 12px; color: var(--muted); width: 90px; text-align: right; }
    .funnel-count { font-size: 13px; font-weight: 700; width: 28px; text-align: center; }

    /* ── Leads table ── */
    .leads-section { margin-bottom: 28px; }
    .leads-filters { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
    .filter-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 12px;
      cursor: pointer;
      transition: all .2s;
    }
    .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
    .search-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 13px;
      margin-left: auto;
      width: 200px;
    }
    .search-box::placeholder { color: var(--muted); }
    .search-box:focus { outline: none; border-color: var(--accent); }

    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left;
      padding: 10px 14px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    td { padding: 14px 14px; font-size: 13px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }

    .lead-name { font-weight: 600; }
    .lead-phone { color: var(--muted); font-size: 12px; margin-top: 2px; }

    /* Score badge */
    .score-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
    }
    .score-hot  { background: rgba(255,107,107,.15); color: var(--hot); }
    .score-warm { background: rgba(255,209,102,.15); color: var(--warm); }
    .score-cold { background: rgba(78,205,196,.15);  color: var(--cold); }
    .score-zero { background: var(--surface2); color: var(--muted); }

    /* Status badges */
    .status-badge {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }
    .status-visita  { background: rgba(94,231,183,.15); color: var(--accent2); }
    .status-ativo   { background: rgba(124,106,247,.15); color: var(--accent); }
    .status-frio    { background: rgba(139,143,168,.1); color: var(--muted); }

    /* Sinais */
    .sinais { display: flex; flex-wrap: wrap; gap: 4px; }
    .sinal-tag {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 10px;
      color: var(--muted);
    }

    /* Tempo */
    .time-ago { color: var(--muted); font-size: 12px; }

    /* Ações */
    .action-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 12px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: all .2s;
    }
    .action-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* Empty state */
    .empty { text-align: center; padding: 48px; color: var(--muted); }

    /* Loading */
    .loading { text-align: center; padding: 48px; }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Follow-up section */
    .followup-list { display: flex; flex-direction: column; gap: 10px; }
    .followup-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: var(--surface2);
      border-radius: 8px;
      border-left: 3px solid var(--accent);
    }
    .followup-item.warn { border-left-color: var(--warm); }
    .followup-info { flex: 1; }
    .followup-name { font-size: 13px; font-weight: 600; }
    .followup-detail { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* Refresh */
    .refresh-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all .2s;
    }
    .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
    .last-update { font-size: 11px; color: var(--muted); }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    ImobOne
  </div>
  <div style="display:flex;align-items:center;gap:12px;">
    <span class="last-update" id="lastUpdate">—</span>
    <button class="refresh-btn" onclick="loadAll()">↻ Atualizar</button>
    <span class="badge-live">● AO VIVO</span>
  </div>
</header>

<main>

  <!-- KPIs -->
  <div class="section-title">Visão Geral</div>
  <div class="kpi-grid" id="kpiGrid">
    <div class="loading"><div class="spinner"></div></div>
  </div>

  <!-- Funil + Chart -->
  <div class="row2">
    <div class="card">
      <div class="card-title">Funil de Intenção</div>
      <div class="funnel" id="funnelEl"></div>
    </div>
    <div class="card">
      <div class="card-title">Sinais mais frequentes</div>
      <canvas id="signalsChart" height="220"></canvas>
    </div>
  </div>

  <!-- Follow-ups pendentes -->
  <div class="card" style="margin-bottom:28px;" id="followupCard">
    <div class="card-title">⏰ Follow-ups Pendentes</div>
    <div class="followup-list" id="followupList">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- Leads table -->
  <div class="leads-section">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
      <div class="section-title" style="margin:0">Pipeline de Leads</div>
    </div>
    <div class="card" style="padding:0;overflow:hidden;">
      <div style="padding:16px 20px;border-bottom:1px solid var(--border);">
        <div class="leads-filters">
          <button class="filter-btn active" onclick="setFilter('all',this)">Todos</button>
          <button class="filter-btn" onclick="setFilter('hot',this)">🔴 Quentes</button>
          <button class="filter-btn" onclick="setFilter('warm',this)">🟡 Mornos</button>
          <button class="filter-btn" onclick="setFilter('cold',this)">🔵 Frios</button>
          <button class="filter-btn" onclick="setFilter('visit',this)">📅 Visita</button>
          <input class="search-box" type="text" placeholder="Buscar lead..." oninput="filterLeads(this.value)" />
        </div>
      </div>
      <div id="leadsTableWrap">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

</main>

<script>
const SUPABASE_URL = "https://ksqtyjucvldlvuzqmnjh.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtzcXR5anVjdmxkbHZ1enFtbmpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3Mjc4MzMsImV4cCI6MjA5MDMwMzgzM30.e0gzgOERIhRHo0muM6jXd8ba_t4dzdHHtKztrvYVKGM";
const CLIENT_ID    = "demo_imobiliaria_vendas";

let allLeads = [];
let activeFilter = 'all';
let signalsChartInstance = null;

async function sbGet(path, params = '') {
  const url = `${SUPABASE_URL}/rest/v1/${path}${params ? '?' + params : ''}`;
  const r = await fetch(url, {
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
  });
  return r.json();
}

function timeAgo(isoStr) {
  if (!isoStr) return '—';
  const diff = Date.now() - new Date(isoStr).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 60) return `${m}m atrás`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h atrás`;
  const d = Math.floor(h / 24);
  return `${d}d atrás`;
}

function scoreClass(s) {
  if (s >= 8)  return 'hot';
  if (s >= 4)  return 'warm';
  if (s > 0)   return 'cold';
  return 'zero';
}
function scoreLabel(s) {
  if (s >= 8)  return '🔴 Quente';
  if (s >= 4)  return '🟡 Morno';
  if (s > 0)   return '🔵 Frio';
  return '⬜ Novo';
}
function statusBadge(lead) {
  if (lead.visita_agendada) return `<span class="status-badge status-visita">📅 Visita</span>`;
  const d = Date.now() - new Date(lead.ultima_interacao).getTime();
  if (d < 3600000 * 2) return `<span class="status-badge status-ativo">● Ativo</span>`;
  return `<span class="status-badge status-frio">Inativo</span>`;
}
function sinaisTags(breakdown) {
  if (!breakdown || !Object.keys(breakdown).length) return '<span style="color:var(--muted);font-size:11px;">—</span>';
  const labels = {
    horario_visita: 'Visita', dados_pessoais: 'Dados', pergunta_especifica: 'Técnico',
    interesse_imovel: 'Imóvel', foto_solicitada: 'Foto', financiamento: 'Financ.',
    pergunta_valor: 'Valor'
  };
  return Object.entries(breakdown)
    .sort((a,b) => b[1]-a[1])
    .slice(0,4)
    .map(([k]) => `<span class="sinal-tag">${labels[k]||k}</span>`)
    .join('');
}

async function loadAll() {
  document.getElementById('lastUpdate').textContent = 'Atualizando...';

  const [leads, followups] = await Promise.all([
    sbGet('leads', `client_id=eq.${CLIENT_ID}&order=intention_score.desc`),
    sbGet('followup_events', `client_id=eq.${CLIENT_ID}&order=sent_at.desc&limit=20`)
  ]);

  allLeads = leads || [];
  renderKPIs();
  renderFunnel();
  renderSignalsChart();
  renderFollowups(followups || []);
  renderTable(allLeads);

  document.getElementById('lastUpdate').textContent =
    `Atualizado às ${new Date().toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'})}`;
}

function renderKPIs() {
  const total    = allLeads.length;
  const hot      = allLeads.filter(l => l.intention_score >= 8).length;
  const warm     = allLeads.filter(l => l.intention_score >= 4 && l.intention_score < 8).length;
  const visitas  = allLeads.filter(l => l.visita_agendada).length;
  const avgScore = total ? Math.round(allLeads.reduce((s,l)=>s+l.intention_score,0)/total) : 0;

  document.getElementById('kpiGrid').innerHTML = `
    <div class="kpi">
      <div class="kpi-value">${total}</div>
      <div class="kpi-label">Total de leads</div>
    </div>
    <div class="kpi hot">
      <div class="kpi-value" style="color:var(--hot)">${hot}</div>
      <div class="kpi-label">Leads quentes ≥8pts</div>
    </div>
    <div class="kpi warm">
      <div class="kpi-value" style="color:var(--warm)">${warm}</div>
      <div class="kpi-label">Leads mornos 4-7pts</div>
    </div>
    <div class="kpi cold">
      <div class="kpi-value" style="color:var(--accent2)">${visitas}</div>
      <div class="kpi-label">Visitas confirmadas</div>
    </div>
    <div class="kpi">
      <div class="kpi-value" style="color:var(--accent)">${avgScore}</div>
      <div class="kpi-label">Score médio</div>
    </div>
  `;
}

function renderFunnel() {
  const steps = [
    { label: 'Total', count: allLeads.length, color: '#7c6af7' },
    { label: 'Engajados (>0)', count: allLeads.filter(l=>l.intention_score>0).length, color: '#4ecdc4' },
    { label: 'Mornos (≥4)', count: allLeads.filter(l=>l.intention_score>=4).length, color: '#ffd166' },
    { label: 'Quentes (≥8)', count: allLeads.filter(l=>l.intention_score>=8).length, color: '#ff6b6b' },
    { label: 'Visita agendada', count: allLeads.filter(l=>l.visita_agendada).length, color: '#5ee7b7' },
  ];
  const max = steps[0].count || 1;
  document.getElementById('funnelEl').innerHTML = steps.map(s => `
    <div class="funnel-step">
      <div class="funnel-label">${s.label}</div>
      <div class="funnel-bar-wrap">
        <div class="funnel-bar" style="width:${Math.max(8, (s.count/max)*100)}%;background:${s.color}20;color:${s.color};">
          ${s.count}
        </div>
      </div>
      <div class="funnel-count">${s.count}</div>
    </div>
  `).join('');
}

function renderSignalsChart() {
  const totals = {};
  allLeads.forEach(l => {
    const bd = l.score_breakdown || {};
    Object.entries(bd).forEach(([k,v]) => { totals[k] = (totals[k]||0) + v; });
  });

  const labels_pt = {
    horario_visita: 'Visita', dados_pessoais: 'Dados pessoais',
    pergunta_especifica: 'Pergunta técnica', interesse_imovel: 'Interesse imóvel',
    foto_solicitada: 'Foto', financiamento: 'Financiamento', pergunta_valor: 'Preço'
  };

  const sorted = Object.entries(totals).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const labels  = sorted.map(([k]) => labels_pt[k] || k);
  const values  = sorted.map(([,v]) => v);
  const colors  = ['#7c6af7','#5ee7b7','#ffd166','#ff6b6b','#4ecdc4','#a78bfa'];

  if (signalsChartInstance) signalsChartInstance.destroy();

  const ctx = document.getElementById('signalsChart').getContext('2d');
  signalsChartInstance = new Chart(ctx, {
    type: 'doughnut',
    data: { labels, datasets: [{ data: values, backgroundColor: colors, borderWidth: 0 }] },
    options: {
      responsive: true,
      plugins: {
        legend: { position: 'bottom', labels: { color: '#8b8fa8', font: { size: 11 }, boxWidth: 12 } }
      }
    }
  });
}

function renderFollowups(events) {
  const now = Date.now();
  // Identifica leads elegíveis para follow-up (silêncio > 24h, Sofia falou por último)
  const pending = allLeads.filter(l => {
    if (!l.ultima_interacao) return false;
    const diff = now - new Date(l.ultima_interacao).getTime();
    return diff > 24*3600000 && l.intention_score > 0;
  });

  const recentSentPhones = new Set(events.map(e => e.lead_phone));

  const toNotify = pending.filter(l => !recentSentPhones.has(l.lead_phone));

  if (!toNotify.length && !events.length) {
    document.getElementById('followupList').innerHTML =
      '<div class="empty">✓ Nenhum follow-up pendente no momento</div>';
    return;
  }

  let html = '';

  // Pendentes (ainda não enviados)
  toNotify.slice(0,5).forEach(l => {
    const diff = now - new Date(l.ultima_interacao).getTime();
    const h = Math.floor(diff/3600000);
    const tipo = h >= 168 ? '7 dias' : h >= 48 ? '48h' : '24h';
    html += `
      <div class="followup-item warn">
        <div>⏳</div>
        <div class="followup-info">
          <div class="followup-name">${l.lead_name || l.lead_phone}</div>
          <div class="followup-detail">Silêncio há ${h}h — elegível para follow-up ${tipo}</div>
        </div>
        <div class="score-badge score-${scoreClass(l.intention_score)}">${l.intention_score}pts</div>
      </div>`;
  });

  // Enviados recentes
  events.slice(0,3).forEach(e => {
    const label_map = {
      silence_24h: '24h', silence_48h: '48h', silence_7d: '7 dias',
      post_visit: 'pós-visita', new_property: 'novo imóvel', crm_reactivation: 'CRM'
    };
    html += `
      <div class="followup-item">
        <div>✓</div>
        <div class="followup-info">
          <div class="followup-name">${e.lead_phone}</div>
          <div class="followup-detail">Follow-up ${label_map[e.event_type]||e.event_type} enviado — ${timeAgo(e.sent_at)}</div>
        </div>
      </div>`;
  });

  document.getElementById('followupList').innerHTML = html || '<div class="empty">Nenhum registro</div>';
}

function renderTable(leads) {
  if (!leads.length) {
    document.getElementById('leadsTableWrap').innerHTML = '<div class="empty">Nenhum lead encontrado</div>';
    return;
  }
  document.getElementById('leadsTableWrap').innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Lead</th>
          <th>Score</th>
          <th>Sinais</th>
          <th>Status</th>
          <th>Última interação</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody>
        ${leads.map(l => `
          <tr>
            <td>
              <div class="lead-name">${l.lead_name || '—'}</div>
              <div class="lead-phone">${l.lead_phone}</div>
            </td>
            <td>
              <span class="score-badge score-${scoreClass(l.intention_score)}">
                ${scoreLabel(l.intention_score)} · ${l.intention_score}pts
              </span>
            </td>
            <td><div class="sinais">${sinaisTags(l.score_breakdown)}</div></td>
            <td>${statusBadge(l)}</td>
            <td><span class="time-ago">${timeAgo(l.ultima_interacao)}</span></td>
            <td>
              <a class="action-btn" href="https://wa.me/${l.lead_phone}" target="_blank">↗ WhatsApp</a>
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function filterLeads(q) {
  applyFilters(q);
}

function applyFilters(search = '') {
  let filtered = allLeads;
  if (activeFilter === 'hot')  filtered = filtered.filter(l => l.intention_score >= 8);
  if (activeFilter === 'warm') filtered = filtered.filter(l => l.intention_score >= 4 && l.intention_score < 8);
  if (activeFilter === 'cold') filtered = filtered.filter(l => l.intention_score > 0 && l.intention_score < 4);
  if (activeFilter === 'visit') filtered = filtered.filter(l => l.visita_agendada);
  if (search) {
    const q = search.toLowerCase();
    filtered = filtered.filter(l =>
      (l.lead_name||'').toLowerCase().includes(q) ||
      l.lead_phone.includes(q)
    );
  }
  renderTable(filtered);
}

// Init
loadAll();
// Auto-refresh a cada 60 segundos
setInterval(loadAll, 60000);
</script>
