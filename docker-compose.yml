# docker-compose.yml — ImobOne-v2 Docker Stack
#
# Deploy via Docker Swarm (sem docker-compose instalado no VPS):
#
#   # Passo 1: build da imagem Python (agents + admin_api)
#   docker build -t imovel-ai-agents:latest .
#
#   # Passo 2: build da imagem Next.js (painel admin frontend)
#   docker build -t imovel-ai-nextjs:latest \
#     --build-arg NEXT_PUBLIC_SUPABASE_URL=... \
#     --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=... \
#     ./frontend
#
#   # Passo 3: deploy do stack
#   docker stack deploy -c docker-compose.yml imob
#
# Remover stack:
#   docker stack rm imob
#
# Logs em tempo real:
#   docker service logs -f imob_agents
#   docker service logs -f imob_admin
#   docker service logs -f imob_nextjs
#   docker service logs -f imob_redis
#
# Roteamento Traefik L7 (app.imobone.com.br):
#   → PathPrefix(/api/webhooks)    : imob_admin (FastAPI, priority=10)
#                                    — para webhook inbound de portais e futuros BSPs
#   → tudo o mais                  : imob_nextjs (Next.js, priority=1)
#   — admin_api:8004 só é acessível via rede interna imob_net; Next.js é o único proxy público
#
# Redis próprio do stack — não depende de OtavioNet nem do Redis do n8n.
# Dentro da rede imob_net, o Redis resolve pelo nome de serviço: redis://redis:6379

version: "3.9"

services:

  # ─── Redis próprio do stack ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - imob_net
    volumes:
      - redis_data:/data
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 30s
      resources:
        limits:
          cpus: "0.5"
          memory: 384M
        reservations:
          cpus: "0.1"
          memory: 64M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Serviço de agentes ─────────────────────────────────────────────────────
  agents:
    image: imovel-ai-agents:latest
    env_file:
      - .env
    environment:
      # Sobrescreve qualquer REDIS_URL do .env — dentro do stack o Redis
      # resolve pelo nome do serviço na rede imob_net.
      - REDIS_URL=redis://redis:6379
    networks:
      - imob_net
    volumes:
      # Diretórios escritos pelo dev_flow em runtime:
      #   agents/clients/{client_id}/consultant.py
      #   prompts/clients/{client_id}/consultant_prompt.md
      # Sem volumes persistentes esses arquivos somem ao reiniciar o container.
      # O dashboard também lê de clients/ — volume compartilhado entre serviços.
      - agents_clients:/app/agents/clients
      - prompts_clients:/app/prompts/clients
      - pipeline_clients:/app/clients
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 60s
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      # Verifica conectividade com o Redis usando o cliente Python já disponível
      # na imagem — sem instalar redis-cli separado.
      test:
        - CMD
        - python
        - -c
        - |
          import os, redis, sys
          try:
              r = redis.Redis.from_url(os.environ.get('REDIS_URL', 'redis://redis:6379'))
              r.ping()
              sys.exit(0)
          except Exception as e:
              print(f"Redis ping falhou: {e}", flush=True)
              sys.exit(1)
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ─── Dashboard FastAPI ───────────────────────────────────────────────────────
  dashboard:
    image: imovel-ai-agents:latest
    command: ["python", "-m", "uvicorn", "dashboard.backend.main:app",
              "--host", "0.0.0.0", "--port", "8000",
              "--workers", "2", "--log-level", "info"]
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
    networks:
      - imob_net
    ports:
      - "8000:8000"
    volumes:
      # Dashboard lê pipeline_report.json e onboarding.json dos clientes
      - pipeline_clients:/app/clients:ro
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 60s
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    healthcheck:
      test: ["CMD", "python", "-c",
             "import httpx, sys; r = httpx.get('http://localhost:8000/health', timeout=5); sys.exit(0 if r.status_code == 200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ─── Admin API — Painel Administrativo ─────────────────────────────────────
  admin:
    image: imovel-ai-agents:latest
    command: ["python", "-m", "uvicorn", "admin_api:app",
              "--host", "0.0.0.0", "--port", "8004",
              "--workers", "1", "--log-level", "info"]
    env_file:
      - /opt/webhook.env
    environment:
      # Redis interno do stack imob
      - REDIS_URL=redis://redis:6379
    networks:
      - imob_net      # Redis interno
      - OtavioNet     # Traefik discovery
    volumes:
      # Acesso aos arquivos do cliente (relatórios, onboarding) — somente leitura
      - pipeline_clients:/app/clients:ro
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 60s
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
      labels:
        # Traefik — admin_api agora só responde ao PathPrefix /api/webhooks (priority=10)
        # Tudo o mais vai para o Next.js (priority=1). admin_api:8004 nunca é exposto
        # diretamente — Next.js chama via rede interna Docker (http://admin_api:8004).
        - "traefik.enable=true"
        - "traefik.docker.network=OtavioNet"
        - "traefik.http.routers.imob-webhooks.rule=Host(`app.imobone.com.br`) && PathPrefix(`/api/webhooks`)"
        - "traefik.http.routers.imob-webhooks.entrypoints=websecure"
        - "traefik.http.routers.imob-webhooks.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.imob-webhooks.service=imob-admin-svc"
        - "traefik.http.routers.imob-webhooks.priority=10"
        - "traefik.http.services.imob-admin-svc.loadbalancer.server.port=8004"
        - "traefik.http.services.imob-admin-svc.loadbalancer.passHostHeader=true"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import httpx, sys; r = httpx.get('http://localhost:8004/health', timeout=5); sys.exit(0 if r.status_code == 200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ─── Next.js — Painel Administrativo Frontend ───────────────────────────────
  # Rota padrão de app.imobone.com.br (priority=1, pega tudo que não é /api/webhooks).
  # Chama admin_api:8004 via rede interna imob_net — nunca através do Traefik.
  # SESSION_SECRET: gerar com `openssl rand -base64 32` e adicionar ao webhook.env.
  nextjs:
    image: imovel-ai-nextjs:latest
    env_file:
      - /opt/webhook.env
    environment:
      - NODE_ENV=production
      - ADMIN_API_URL=http://admin:8004
      # SESSION_SECRET e NEXT_PUBLIC_SUPABASE_* vêm do webhook.env
    networks:
      - imob_net      # acesso interno ao admin_api:8004
      - OtavioNet     # Traefik discovery
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 60s
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
      labels:
        # Rota padrão — todo o tráfego de app.imobone.com.br que não for /api/webhooks
        - "traefik.enable=true"
        - "traefik.docker.network=OtavioNet"
        - "traefik.http.routers.imob-nextjs.rule=Host(`app.imobone.com.br`)"
        - "traefik.http.routers.imob-nextjs.entrypoints=websecure"
        - "traefik.http.routers.imob-nextjs.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.imob-nextjs.service=imob-nextjs-svc"
        - "traefik.http.routers.imob-nextjs.priority=1"
        - "traefik.http.services.imob-nextjs-svc.loadbalancer.server.port=3000"
        - "traefik.http.services.imob-nextjs-svc.loadbalancer.passHostHeader=true"
        # Security headers (Traefik v3 Swarm — @swarm obrigatório)
        - "traefik.http.routers.imob-nextjs.middlewares=imob-nextjs-security@swarm"
        - "traefik.http.middlewares.imob-nextjs-security.headers.stsSeconds=31536000"
        - "traefik.http.middlewares.imob-nextjs-security.headers.stsIncludeSubdomains=true"
        - "traefik.http.middlewares.imob-nextjs-security.headers.stsPreload=true"
        - "traefik.http.middlewares.imob-nextjs-security.headers.forceSTSHeader=true"
        - "traefik.http.middlewares.imob-nextjs-security.headers.frameDeny=true"
        - "traefik.http.middlewares.imob-nextjs-security.headers.contentTypeNosniff=true"
        - "traefik.http.middlewares.imob-nextjs-security.headers.browserXssFilter=true"
        - "traefik.http.middlewares.imob-nextjs-security.headers.referrerPolicy=strict-origin-when-cross-origin"
    healthcheck:
      test: ["CMD", "node", "-e",
             "require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

# ─── Volumes persistentes ─────────────────────────────────────────────────────
# Named volumes gerenciados pelo Docker — sobrevivem a restarts e redeploys.
# Para inspecionar: docker volume ls | grep imob
# Para backup:      docker run --rm -v imob_pipeline_clients:/data alpine tar czf - /data
volumes:
  # /data — persistência do Redis (AOF habilitado)
  redis_data:

  # /app/agents/clients — consultant.py gerado pelo dev_flow por cliente
  agents_clients:

  # /app/prompts/clients — prompt resolvido por cliente (consultant_prompt.md)
  prompts_clients:

  # /app/clients — onboarding.json, config.json, pipeline_report.json por cliente
  # Compartilhado (rw) pelo agents e (ro) pelo dashboard
  pipeline_clients:

# ─── Redes ────────────────────────────────────────────────────────────────────
# Rede overlay interna ao stack — Redis, agents e dashboard se comunicam
# por nome de serviço sem exposição externa.
# attachable: true permite que containers avulsos (docker run) se conectem
# à rede para rodar setup_pipeline.py e outros scripts de administração.
networks:
  imob_net:
    driver: overlay
    attachable: true

  # Rede compartilhada com Traefik — usada apenas pelo serviço admin
  OtavioNet:
    external: true
