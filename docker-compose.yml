# docker-compose.yml — ImobOne-v2 Docker Stack
#
# Deploy via Docker Swarm (sem docker-compose instalado no VPS):
#
#   docker build -t imovel-ai-agents:latest .
#   docker stack deploy -c docker-compose.yml imob
#
# Remover stack:
#   docker stack rm imob
#
# Logs em tempo real:
#   docker service logs -f imob_agents
#   docker service logs -f imob_dashboard
#   docker service logs -f imob_redis
#
# Redis próprio do stack — não depende de OtavioNet nem do Redis do n8n.
# Dentro da rede imob_net, o Redis resolve pelo nome de serviço: redis://redis:6379

version: "3.9"

services:

  # ─── Redis próprio do stack ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - imob_net
    volumes:
      - redis_data:/data
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 30s
      resources:
        limits:
          cpus: "0.5"
          memory: 384M
        reservations:
          cpus: "0.1"
          memory: 64M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Serviço de agentes ─────────────────────────────────────────────────────
  agents:
    image: imovel-ai-agents:latest
    env_file:
      - .env
    environment:
      # Sobrescreve qualquer REDIS_URL do .env — dentro do stack o Redis
      # resolve pelo nome do serviço na rede imob_net.
      - REDIS_URL=redis://redis:6379
    networks:
      - imob_net
    volumes:
      # Diretórios escritos pelo dev_flow em runtime:
      #   agents/clients/{client_id}/consultant.py
      #   prompts/clients/{client_id}/consultant_prompt.md
      # Sem volumes persistentes esses arquivos somem ao reiniciar o container.
      # O dashboard também lê de clients/ — volume compartilhado entre serviços.
      - agents_clients:/app/agents/clients
      - prompts_clients:/app/prompts/clients
      - pipeline_clients:/app/clients
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 60s
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      # Verifica conectividade com o Redis usando o cliente Python já disponível
      # na imagem — sem instalar redis-cli separado.
      test:
        - CMD
        - python
        - -c
        - |
          import os, redis, sys
          try:
              r = redis.Redis.from_url(os.environ.get('REDIS_URL', 'redis://redis:6379'))
              r.ping()
              sys.exit(0)
          except Exception as e:
              print(f"Redis ping falhou: {e}", flush=True)
              sys.exit(1)
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ─── Dashboard FastAPI ───────────────────────────────────────────────────────
  dashboard:
    image: imovel-ai-agents:latest
    command: ["python", "-m", "uvicorn", "dashboard.backend.main:app",
              "--host", "0.0.0.0", "--port", "8000",
              "--workers", "2", "--log-level", "info"]
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
    networks:
      - imob_net
    ports:
      - "8000:8000"
    volumes:
      # Dashboard lê pipeline_report.json e onboarding.json dos clientes
      - pipeline_clients:/app/clients:ro
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 60s
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    healthcheck:
      test: ["CMD", "python", "-c",
             "import httpx, sys; r = httpx.get('http://localhost:8000/health', timeout=5); sys.exit(0 if r.status_code == 200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ─── Admin API — Painel Administrativo ─────────────────────────────────────
  admin:
    image: imovel-ai-agents:latest
    command: ["python", "-m", "uvicorn", "admin_api:app",
              "--host", "0.0.0.0", "--port", "8004",
              "--workers", "1", "--log-level", "info"]
    env_file:
      - /opt/webhook.env
    environment:
      # Redis interno do stack imob
      - REDIS_URL=redis://redis:6379
    networks:
      - imob_net      # Redis interno
      - OtavioNet     # Traefik discovery
    volumes:
      # Acesso aos arquivos do cliente (relatórios, onboarding) — somente leitura
      - pipeline_clients:/app/clients:ro
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 60s
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
      labels:
        # Traefik — rota pública app.imobone.com.br → porta 8004
        - "traefik.enable=true"
        - "traefik.docker.network=OtavioNet"
        - "traefik.http.routers.imob-admin.rule=Host(`app.imobone.com.br`)"
        - "traefik.http.routers.imob-admin.entrypoints=websecure"
        - "traefik.http.routers.imob-admin.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.imob-admin.service=imob-admin"
        - "traefik.http.services.imob-admin.loadbalancer.server.port=8004"
        - "traefik.http.services.imob-admin.loadbalancer.passHostHeader=true"
        # Middlewares de segurança — sem sufixo @provider (mesmo provider que o router)
        - "traefik.http.routers.imob-admin.middlewares=imob-admin-security@swarm"
        - "traefik.http.middlewares.imob-admin-security.headers.stsSeconds=31536000"
        - "traefik.http.middlewares.imob-admin-security.headers.stsIncludeSubdomains=true"
        - "traefik.http.middlewares.imob-admin-security.headers.stsPreload=true"
        - "traefik.http.middlewares.imob-admin-security.headers.forceSTSHeader=true"
        - "traefik.http.middlewares.imob-admin-security.headers.frameDeny=true"
        - "traefik.http.middlewares.imob-admin-security.headers.contentTypeNosniff=true"
        - "traefik.http.middlewares.imob-admin-security.headers.browserXssFilter=true"
        - "traefik.http.middlewares.imob-admin-security.headers.referrerPolicy=strict-origin-when-cross-origin"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import httpx, sys; r = httpx.get('http://localhost:8004/health', timeout=5); sys.exit(0 if r.status_code == 200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

# ─── Volumes persistentes ─────────────────────────────────────────────────────
# Named volumes gerenciados pelo Docker — sobrevivem a restarts e redeploys.
# Para inspecionar: docker volume ls | grep imob
# Para backup:      docker run --rm -v imob_pipeline_clients:/data alpine tar czf - /data
volumes:
  # /data — persistência do Redis (AOF habilitado)
  redis_data:

  # /app/agents/clients — consultant.py gerado pelo dev_flow por cliente
  agents_clients:

  # /app/prompts/clients — prompt resolvido por cliente (consultant_prompt.md)
  prompts_clients:

  # /app/clients — onboarding.json, config.json, pipeline_report.json por cliente
  # Compartilhado (rw) pelo agents e (ro) pelo dashboard
  pipeline_clients:

# ─── Redes ────────────────────────────────────────────────────────────────────
# Rede overlay interna ao stack — Redis, agents e dashboard se comunicam
# por nome de serviço sem exposição externa.
# attachable: true permite que containers avulsos (docker run) se conectem
# à rede para rodar setup_pipeline.py e outros scripts de administração.
networks:
  imob_net:
    driver: overlay
    attachable: true

  # Rede compartilhada com Traefik — usada apenas pelo serviço admin
  OtavioNet:
    external: true
